global:
  imageRegistry: "registry.example.com/observability"

collector:
  existingDeployment: "otel-collector"
  targetEndpoint: "http://bering-discovery.observability.svc.cluster.local:4318"
  snippets:
    enabled: true
    tlsInsecure: true

bering:
  enabled: true
  image:
    repository: "mb3r-lab/bering"
    tag: "v0.3.3"
    digest: "sha256:b38713a15194827f3410c3972071a5fd358f1fe55847952289f5edd7c0b82174"
  service:
    publicName: bering-discovery
  serviceMonitor:
    enabled: true

sheaft:
  enabled: true
  image:
    repository: "mb3r-lab/sheaft"
    tag: "v0.2.3"
    digest: "sha256:07bca0e01ef0bfb09c9561c2883d7acf7b2ee6374be373ecd0168747da9f1e76"
  service:
    publicName: sheaft-reports
  serviceMonitor:
    enabled: true

prometheusScrapeHooks:
  enabled: true

grafanaDashboards:
  enabled: true
  providerName: "mb3r-prod"
  existingConfigMaps:
    - mb3r-bering-dashboard-v1-0-0
    - mb3r-sheaft-dashboard-v1-0-0
