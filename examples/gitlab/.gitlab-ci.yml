stages:
  - discover
  - gate
  - report

include:
  - component: $CI_SERVER_FQDN/group/mb3r-stack/bering-discover@v0.3.3
    inputs:
      stage: discover
      command: |
        python - <<'PY'
        import json
        import os
        from pathlib import Path
        Path(os.environ["MB3R_PAYLOAD_JSON"]).write_text(
            json.dumps({"summary": "consumer discovery", "findings": 0}),
            encoding="utf-8",
        )
        PY
  - component: $CI_SERVER_FQDN/group/mb3r-stack/sheaft-gate@v0.3.3
    inputs:
      stage: gate
      command: |
        python - <<'PY'
        import json
        import os
        from pathlib import Path
        Path(os.environ["MB3R_PAYLOAD_JSON"]).write_text(
            json.dumps({"decision": "review", "summary": "consumer gate"}),
            encoding="utf-8",
        )
        PY
  - component: $CI_SERVER_FQDN/group/mb3r-stack/mb3r-report@v0.3.3
    inputs:
      stage: report
