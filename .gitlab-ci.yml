stages:
  - validate
  - package

default:
  image: python:3.13
  before_script:
    - python -m pip install -r requirements.txt

validate:
  stage: validate
  script:
    - python scripts/validate.py

package:
  stage: package
  script:
    - python scripts/release_dry_run.py
  artifacts:
    when: always
    paths:
      - dist/
