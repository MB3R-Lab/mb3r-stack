  targetEndpoint: ""
  snippets:
    enabled: false
    name: ""
    includeMetricsPipeline: true
    includeLogsPipeline: true
    includeTracesPipeline: true
    includePrometheusReceiver: false
    tlsInsecure: true

bering:
  enabled: false
  replicaCount: 1
  image:
    registry: ""
    repository: "ghcr.io/mb3r-lab/bering"
    tag: "v0.1.0"
    digest: "sha256:8e8ce6599b43477b0653617e829d41c62a3189d16b60ecb424cca718fc0e2674"
    pullPolicy: IfNotPresent
  extraArgs: []
  env: []
