spec:
  inputs:
    stage:
      default: gate
    runner_image:
      default: python:3.13
    discovery_report_path:
      default: ".mb3r/bering/bering-discovery.json"
    output_dir:
      default: ".mb3r/sheaft"
    command:
      default: ""
    image_ref:
      default: "ghcr.io/mb3r-lab/sheaft@sha256:eb1ebf9d96c55c5bb29e226e07496d152eb3a66b52dd9d34ba799fa4aef70624"
    artifact_name:
      default: "mb3r-sheaft-gate"
    default_decision:
      default: "review"
---
mb3r:sheaft-gate:
  stage: $[[ inputs.stage ]]
  image: $[[ inputs.runner_image ]]
  script:
    - |
      python - <<'PY'
      import json
      import os
      import subprocess
      from datetime import datetime, timezone
      from pathlib import Path

      output_dir = Path("$[[ inputs.output_dir ]]")
      output_dir.mkdir(parents=True, exist_ok=True)
      payload_path = output_dir / "sheaft-payload.json"
      report_path = output_dir / "sheaft-gate.json"
      discovery_report = Path("$[[ inputs.discovery_report_path ]]")
      command = """$[[ inputs.command ]]""".strip()

      env = os.environ.copy()
      env["MB3R_DISCOVERY_REPORT"] = discovery_report.as_posix()
      env["MB3R_PAYLOAD_JSON"] = str(payload_path)
      env["MB3R_IMAGE_REF"] = "$[[ inputs.image_ref ]]"

      exit_code = 0
      status = "pending"
      decision = "$[[ inputs.default_decision ]]"
      if command:
          exit_code = subprocess.run(command, shell=True, env=env, check=False).returncode
          status = "success" if exit_code == 0 else "failed"
          if exit_code != 0:
              decision = "fail"

      payload = None
      if payload_path.exists():
          payload = json.loads(payload_path.read_text(encoding="utf-8"))
          decision = payload.get("decision", decision)
          if exit_code == 0:
              status = "success"

      report = {
          "schemaVersion": "v1alpha1",
          "kind": "mb3r.sheaft.gate",
          "adapter": "gitlab-component",
          "generatedAt": datetime.now(timezone.utc).replace(microsecond=0).isoformat(),
          "discoveryReport": discovery_report.as_posix(),
          "imageRef": "$[[ inputs.image_ref ]]",
          "command": command,
          "decision": decision,
          "status": status,
          "exitCode": exit_code,
          "payloadPath": payload_path.as_posix(),
          "artifactName": "$[[ inputs.artifact_name ]]",
          "payload": payload,
      }
      report_path.write_text(json.dumps(report, indent=2) + "\n", encoding="utf-8")
      (output_dir / "sheaft.env").write_text(
          "\n".join(
              [
                  f"MB3R_SHEAFT_REPORT={report_path.as_posix()}",
                  f"MB3R_SHEAFT_PAYLOAD={payload_path.as_posix()}",
                  f"MB3R_SHEAFT_ARTIFACT=$[[ inputs.artifact_name ]]",
                  f"MB3R_SHEAFT_STATUS={status}",
                  f"MB3R_SHEAFT_DECISION={decision}",
              ]
          )
          + "\n",
          encoding="utf-8",
      )

      if exit_code != 0:
          raise SystemExit(exit_code)
      PY
  artifacts:
    when: always
    paths:
      - $[[ inputs.output_dir ]]
    reports:
      dotenv: $[[ inputs.output_dir ]]/sheaft.env
