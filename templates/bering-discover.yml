spec:
  inputs:
    stage:
      default: discover
    runner_image:
      default: python:3.13
    target_path:
      default: "."
    output_dir:
      default: ".mb3r/bering"
    command:
      default: ""
    image_ref:
      default: "TODO-SET-BERING-IMAGE"
    artifact_name:
      default: "mb3r-bering-discovery"
---
mb3r:bering-discover:
  stage: $[[ inputs.stage ]]
  image: $[[ inputs.runner_image ]]
  script:
    - |
      python - <<'PY'
      import json
      import os
      import subprocess
      from datetime import datetime, timezone
      from pathlib import Path

      output_dir = Path("$[[ inputs.output_dir ]]")
      output_dir.mkdir(parents=True, exist_ok=True)
      payload_path = output_dir / "bering-payload.json"
      report_path = output_dir / "bering-discovery.json"
      command = """$[[ inputs.command ]]""".strip()

      env = os.environ.copy()
      env["MB3R_TARGET_PATH"] = "$[[ inputs.target_path ]]"
      env["MB3R_PAYLOAD_JSON"] = str(payload_path)
      env["MB3R_IMAGE_REF"] = "$[[ inputs.image_ref ]]"

      exit_code = 0
      status = "pending"
      if command:
          exit_code = subprocess.run(command, shell=True, env=env, check=False).returncode
          status = "success" if exit_code == 0 else "failed"

      payload = None
      if payload_path.exists():
          payload = json.loads(payload_path.read_text(encoding="utf-8"))
          if exit_code == 0:
              status = "success"

      report = {
          "schemaVersion": "v1alpha1",
          "kind": "mb3r.bering.discovery",
          "adapter": "gitlab-component",
          "generatedAt": datetime.now(timezone.utc).replace(microsecond=0).isoformat(),
          "targetPath": "$[[ inputs.target_path ]]",
          "imageRef": "$[[ inputs.image_ref ]]",
          "command": command,
          "status": status,
          "exitCode": exit_code,
          "payloadPath": payload_path.as_posix(),
          "artifactName": "$[[ inputs.artifact_name ]]",
          "payload": payload,
      }
      report_path.write_text(json.dumps(report, indent=2) + "\n", encoding="utf-8")
      (output_dir / "bering.env").write_text(
          "\n".join(
              [
                  f"MB3R_BERING_REPORT={report_path.as_posix()}",
                  f"MB3R_BERING_PAYLOAD={payload_path.as_posix()}",
                  f"MB3R_BERING_ARTIFACT=$[[ inputs.artifact_name ]]",
                  f"MB3R_BERING_STATUS={status}",
              ]
          )
          + "\n",
          encoding="utf-8",
      )

      if exit_code != 0:
          raise SystemExit(exit_code)
      PY
  artifacts:
    when: always
    paths:
      - $[[ inputs.output_dir ]]
    reports:
      dotenv: $[[ inputs.output_dir ]]/bering.env
