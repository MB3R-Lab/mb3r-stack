apiVersion: opentelemetry.io/v1beta1
kind: OpenTelemetryCollector
metadata:
  name: otel-demo
spec:
  config: |
    exporters:
      otlphttp/bering:
        endpoint: http://mb3r-otel-addon-bering:4318
        tls:
          insecure: true
    service:
      pipelines:
        traces:
          exporters: [debug, otlphttp/bering]
