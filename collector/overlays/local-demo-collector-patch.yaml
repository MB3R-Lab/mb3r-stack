apiVersion: opentelemetry.io/v1beta1
kind: OpenTelemetryCollector
metadata:
  name: otel-demo
spec:
  config: |
    exporters:
      otlp/bering:
        endpoint: mb3r-otel-addon-bering:4317
        tls:
          insecure: true
    service:
      pipelines:
        traces:
          exporters: [debug, otlp/bering]
        metrics:
          exporters: [debug, otlp/bering]
