receivers:
  prometheus/mb3r:
    config:
      scrape_configs:
        - job_name: "mb3r-bering"
          metrics_path: /metrics
          static_configs:
            - targets:
                - ${BERING_METRICS_TARGET}
        - job_name: "mb3r-sheaft"
          metrics_path: /metrics
          static_configs:
            - targets:
                - ${SHEAFT_METRICS_TARGET}
