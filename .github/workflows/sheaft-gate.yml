name: sheaft-gate

on:
  workflow_call:
    inputs:
      discovery-artifact-name:
        type: string
        default: ""
      discovery-report-path:
        type: string
        default: ".mb3r/bering/bering-discovery.json"
      output-dir:
        type: string
        default: ".mb3r/sheaft"
      command:
        type: string
        default: ""
      image-ref:
        type: string
        default: "ghcr.io/mb3r-lab/sheaft@sha256:543771ca12722147578bf7a99dd07c5477c7fe15e7404cf6659a2a02f203a93b"
      artifact-name:
        type: string
        default: "mb3r-sheaft-gate"
      upload-artifact:
        type: boolean
        default: true
      default-decision:
        type: string
        default: "review"
    outputs:
      report-path:
        description: Gate envelope JSON path within the artifact.
        value: ${{ jobs.sheaft-gate.outputs.report-path }}
      payload-path:
        description: Raw gate payload JSON path within the artifact.
        value: ${{ jobs.sheaft-gate.outputs.payload-path }}
      artifact-name:
        description: Uploaded artifact name.
        value: ${{ jobs.sheaft-gate.outputs.artifact-name }}
      decision:
        description: Gate decision value.
        value: ${{ jobs.sheaft-gate.outputs.decision }}
      status:
        description: Gate adapter status.
        value: ${{ jobs.sheaft-gate.outputs.status }}

jobs:
  sheaft-gate:
    runs-on: ubuntu-latest
    outputs:
      report-path: ${{ steps.adapter.outputs.report-path }}
      payload-path: ${{ steps.adapter.outputs.payload-path }}
      artifact-name: ${{ steps.adapter.outputs.artifact-name }}
      decision: ${{ steps.adapter.outputs.decision }}
      status: ${{ steps.adapter.outputs.status }}
    steps:
      - uses: actions/checkout@v6

      - if: ${{ inputs.discovery-artifact-name != '' }}
        uses: actions/download-artifact@v4
        with:
          name: ${{ inputs.discovery-artifact-name }}
          path: .mb3r/input-discovery

      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Run gate adapter
        id: adapter
        shell: bash
        env:
          DISCOVERY_ARTIFACT: ${{ inputs.discovery-artifact-name }}
          DISCOVERY_REPORT_PATH: ${{ inputs.discovery-report-path }}
          OUTPUT_DIR: ${{ inputs.output-dir }}
          COMMAND: ${{ inputs.command }}
          IMAGE_REF: ${{ inputs.image-ref }}
          ARTIFACT_NAME: ${{ inputs.artifact-name }}
          DEFAULT_DECISION: ${{ inputs.default-decision }}
        run: |
          python - <<'PY'
          import json
          import os
          import subprocess
          from datetime import datetime, timezone
          from pathlib import Path

          output_dir = Path(os.environ["OUTPUT_DIR"])
          output_dir.mkdir(parents=True, exist_ok=True)
          payload_path = output_dir / "sheaft-payload.json"
          report_path = output_dir / "sheaft-gate.json"

          discovery_artifact = os.environ.get("DISCOVERY_ARTIFACT", "").strip()
          if discovery_artifact:
              discovery_report = Path(".mb3r/input-discovery") / Path(os.environ["DISCOVERY_REPORT_PATH"]).name
          else:
              discovery_report = Path(os.environ["DISCOVERY_REPORT_PATH"])

          command = os.environ.get("COMMAND", "").strip()
          env = os.environ.copy()
          env["MB3R_DISCOVERY_REPORT"] = discovery_report.as_posix()
          env["MB3R_PAYLOAD_JSON"] = str(payload_path)
          env["MB3R_IMAGE_REF"] = os.environ["IMAGE_REF"]

          exit_code = 0
          status = "pending"
          decision = os.environ["DEFAULT_DECISION"]
          if command:
              exit_code = subprocess.run(command, shell=True, env=env, check=False).returncode
              status = "success" if exit_code == 0 else "failed"
              if exit_code != 0:
                  decision = "fail"

          payload = None
          if payload_path.exists():
              payload = json.loads(payload_path.read_text(encoding="utf-8"))
              decision = payload.get("decision", decision)
              if exit_code == 0:
                  status = "success"

          report = {
              "schemaVersion": "v1alpha1",
              "kind": "mb3r.sheaft.gate",
              "adapter": "github-reusable-workflow",
              "generatedAt": datetime.now(timezone.utc).replace(microsecond=0).isoformat(),
              "discoveryReport": discovery_report.as_posix(),
              "imageRef": os.environ["IMAGE_REF"],
              "command": command,
              "decision": decision,
              "status": status,
              "exitCode": exit_code,
              "payloadPath": payload_path.as_posix(),
              "artifactName": os.environ["ARTIFACT_NAME"],
              "payload": payload,
          }
          report_path.write_text(json.dumps(report, indent=2) + "\n", encoding="utf-8")

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as handle:
              handle.write(f"report-path={report_path.as_posix()}\n")
              handle.write(f"payload-path={payload_path.as_posix()}\n")
              handle.write(f"artifact-name={os.environ['ARTIFACT_NAME']}\n")
              handle.write(f"decision={decision}\n")
              handle.write(f"status={status}\n")

          if exit_code != 0:
              raise SystemExit(exit_code)
          PY

      - if: ${{ inputs.upload-artifact }}
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.adapter.outputs.artifact-name }}
          path: ${{ inputs.output-dir }}
